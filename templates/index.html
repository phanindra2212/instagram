{% load static %}
<!DOCTYPE html>
<html lang="ENG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
    <link rel="icon" type="image/png" href="{% static 'img/instagram-logo.png' %}">
    <title>Instagram </title>
</head>
<body>
    <main class="flex align-items-center justify-content-center">
        
        <section id="auth" class="flex direction-column">
            <div class="panel login flex direction-column">
                <h1 title="Instagram" class="flex justify-content-center">
                    <img src="{% static 'img/instagram-logo.png' %}" alt="Instagram logo" title="Instagram logo" />
                </h1>
                
                <form action="{% url 'login' %}" , method="post">
                    {% csrf_token %} 
                    <label for="email" class="sr-only">Phone number,username, or email</label>
                    <input name="email" placeholder="Phone number,username, or email" />

                    <label for="password" class="sr-only">Password</label>
                    <input name="password" type="text" placeholder="password" />

<input type="submit" value="Log In" style="background-color: #0095f6; color: white;" />                    

                </form>
                <div class="flex separator align-items-center">
                    <span></span>
                    <div class="or">OR</div>
                    <span></span>
                </div>
                <div class="login-with-fb flex direction-column align-items-center">
                    <div>
                        <img />
                        <a>Log in with facebook</a>
                    </div>
                    <a href="#">Forgot Password</a>
                </div>
            </div>
            <div class="panel register flex justify-content-center">
                <p>Don't have an account</p>
                <a href="#">Sign Up</a>
            </div>
            <div class="app-download flex direction-column align-items-center">
                <p>Get the app</p>
                <div class="flex justify-content-center">
                    <img src="{% static 'img/apple-button.png' %}"      alt="Imagem com a logo da Apple Store" title="Imagem com a logo da Apple Store" />
                    <img src="{% static 'img/googleplay-button.png' %}" alt="Imagem com a logo da Google Play" title="Imagem com a logo da Google Play" />
                </div>
            </div>
        </section>
    </main>
    <footer>
        <ul class="flex flex-wrap justify-content-center">
            <li><a href="#">ABOUT</a></li>
            <li><a href="#">HELP</a></li>
            <li><a href="#">PRESS</a></li>
            <li><a href="#">API</a></li>
            <li><a href="#">CAREERS</a></li>
            <li><a href="#">PRIVACY</a></li>
            <li><a href="#">TERMS</a></li>
            <li><a href="#">LOCATIONS</a></li>
            <li><a href="#">TOP ACCOUNTS</a></li>
            <li><a href="#">HASHTAGS</a></li>
            <li><a href="#">LANGUAGE</a></li>
        </ul>
        <p class="copyright">© 2020 Instagram NY Facebook</p>
    </footer>
</body>
</html>
